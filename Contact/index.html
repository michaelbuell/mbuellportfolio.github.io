<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio - Contact</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <header>
    <span class="header-name">Michael Buell</span>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../About Me/index.html">About Me</a></li>
        <li><a href="../Projects/index.html">Projects</a></li>
        <li><a href="index.html">Contact</a></li>
      </ul>
    </nav>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <div class="page-hero">
    <h1>Contact</h1>
    <p>Let's connect — I'd love to hear from you.</p>
  </div>
 
  <main>
 
    <section id="contact-info">
      <h2>Find Me Online</h2>
      <div class="contact-grid">
        <div class="contact-item">
          <div class="icon">✉️</div>
          <div class="label">Email</div>
          <a href="mailto:you@example.com">[your@email.com]</a>
        </div>
        <div class="contact-item">
          <div class="icon">💼</div>
          <div class="label">LinkedIn</div>
          <a href="#" target="_blank" rel="noopener">LinkedIn Profile</a>
        </div>
        <div class="contact-item">
          <div class="icon">🐙</div>
          <div class="label">GitHub</div>
          <a href="#" target="_blank" rel="noopener">GitHub Profile</a>
        </div>
      </div>
    </section>
 
    <section id="contact-form-section">
      <h2>Send a Message</h2>
      <div class="card">
 
        <!-- ⚠️ See SETUP_INSTRUCTIONS.md to configure the Formspree endpoint -->
        <form id="contact-form" novalidate>
 
          <div class="form-group">
            <label for="name">Your Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Jane Smith"
              autocomplete="name"
            />
            <p class="field-error" id="name-error" role="alert"></p>
          </div>
 
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="jane@example.com"
              autocomplete="email"
            />
            <p class="field-error" id="email-error" role="alert"></p>
          </div>
 
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Hi! I'd love to chat about…"
            ></textarea>
            <p class="field-error" id="message-error" role="alert"></p>
          </div>
 
          <button type="submit" id="submit-btn" class="btn btn-primary">Send Message</button>
 
          <div id="form-status" class="form-status" role="status" aria-live="polite"></div>
 
        </form>
      </div>
    </section>
 
  </main>
 
  <footer>
    <p>&copy; 2026 Your Name &mdash; <a href="contact.html">Get in touch</a></p>
  </footer>
 
  <button id="scroll-top" aria-label="Scroll to top">&#8679;</button>
 
  <script src="main.js"></script>
  <script src="contact-form.js"></script>
</body>
</html>
